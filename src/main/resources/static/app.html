<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理系统</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/table.css">
    <link rel="stylesheet" href="/css/button.css">
    <link rel="stylesheet" href="/css/form.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/toast.css">
    <link rel="stylesheet" href="/css/pagination.css">
    <style>
        /* 额外的应用样式 */
        .page-container {
            padding: 0;
        }
        .page-content {
            background: white;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-sm);
            padding: var(--spacing-lg);
        }
        .page-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
        }
        /* 加载动画 */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 侧边栏菜单移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 101;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .content {
                margin-left: 0;
            }
            .menu-toggle {
                display: flex;
            }
        }
        .menu-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="flex-center" style="gap: var(--spacing-md);">
            <div class="menu-toggle" id="menuToggle">☰</div>
            <div class="logo">
                <span>📁</span>
                <span>文件管理系统</span>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name" id="username">加载中...</span>
            <button class="btn btn-sm btn-ghost" onclick="handleLogout()">退出</button>
        </div>
    </header>

    <!-- 主区域 -->
    <div class="main">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <nav class="nav">
                <a href="#dashboard" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="#field-config" class="nav-item" data-page="field-config">
                    <span class="nav-icon">⚙️</span>
                    <span>字段配置</span>
                </a>
                <a href="#template" class="nav-item" data-page="template">
                    <span class="nav-icon">📥</span>
                    <span>模板下载</span>
                </a>
                <a href="#file-upload" class="nav-item" data-page="file-upload">
                    <span class="nav-icon">📤</span>
                    <span>文件上传</span>
                </a>
                <a href="#file-list" class="nav-item" data-page="file-list">
                    <span class="nav-icon">📋</span>
                    <span>文件列表</span>
                </a>
                <a href="#log" class="nav-item" data-page="log">
                    <span class="nav-icon">📝</span>
                    <span>操作日志</span>
                </a>
            </nav>
        </aside>

        <!-- 内容区 -->
        <main class="content" id="mainContent">
            <!-- 动态内容区域 -->
        </main>
    </div>

    <!-- 遮罩层（移动端侧边栏） -->
    <div class="overlay" id="overlay"></div>

    <!-- 提示框容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 弹窗容器 -->
    <div id="modalContainer"></div>

    <!-- 脚本 -->
    <script src="/js/config.js?v=3"></script>
    <script src="/js/utils.js?v=3"></script>
    <script src="/js/api.js?v=3"></script>
    <script src="/js/auth.js?v=3"></script>
    <script src="/js/router.js?v=3"></script>
    <script src="/js/ui.js?v=3"></script>
    <script src="/js/dashboard.js?v=3"></script>
    <script src="/js/field-config.js?v=3"></script>
    <script src="/js/template.js?v=4-debug"></script>
    <script src="/js/file-upload.js?v=3"></script>
    <script src="/js/file-list.js?v=3"></script>
    <script src="/js/file-detail.js?v=3"></script>
    <script src="/js/log.js?v=3"></script>

    <script>
        // 检查登录状态
        if (!isLoggedIn()) {
            window.location.href = '/login.html';
        }

        // 更新用户信息显示
        function updateUserInfo() {
            const user = getCurrentUser();
            if (user) {
                const usernameEl = document.getElementById('username');
                if (usernameEl) {
                    usernameEl.textContent = user.username;
                }
            }
        }

        // 退出登录
        async function handleLogout() {
            const confirmed = await showConfirm({
                title: '确认退出',
                message: '确定要退出登录吗？',
                type: 'warning'
            });

            if (confirmed) {
                try {
                    await API.auth.logout();
                } catch (error) {
                    console.error('Logout error:', error);
                }
                logout();
            }
        }

        // 移动端侧边栏切换
        function setupMobileSidebar() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            });
        }

        // 页面加载初始化
        function initApp() {
            updateUserInfo();
            applyPermissions();
            setupMobileSidebar();

            // 初始化路由
            const pageFunction = router.initRouter();

            // 加载页面内容
            if (pageFunction && window[pageFunction]) {
                window[pageFunction]();
            }

            // 监听路由变化
            router.setupRouterListener((functionName) => {
                if (window[functionName]) {
                    window[functionName]();
                }
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
